<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configuração Inicial - Agendamentos Lab</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}" type="image/x-icon">
</head>
<body class="auth-page">
    <div class="auth-container">
        <header class="auth-header">
            <img src="{{ url_for('static', filename='logo_default.png') }}" alt="Logo da Escola" class="auth-logo">
            <h1 class="app-title">Agendamentos Lab</h1>
        </header>
        <main class="auth-main">
            <div class="auth-card">
                <h2 class="section-title">Configuração Inicial</h2>
                <p class="subtitle">Crie a conta do primeiro administrador para começar.</p>
                {% if error %}
                    <p class="error-message">{{ error }}</p>
                {% endif %}
                <form action="{{ url_for('setup_admin') }}" method="POST">
                    <div class="form-group">
                        <label for="nome">Nome de Usuário:</label>
                        <input type="text" id="nome" name="nome" required>
                    </div>
                    <div class="form-group">
                        <label for="senha">Senha:</label>
                        <input type="password" id="senha" name="senha" required>
                    </div>
                    <div class="form-group">
                        <label for="email">E-mail (Opcional):</label>
                        <input type="email" id="email" name="email">
                    </div>
                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary">Criar Administrador</button>
                    </div>
                </form>
            </div>
        </main>
    </div>
</body>
</html>
